<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bear Photo Album</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; margin: 0; }
        .container { background: #1e1e1e; padding: 25px; border-radius: 20px; max-width: 400px; margin: 0 auto; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #00bcd4; margin-bottom: 20px; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .btn-view { background: #ff9800; color: white; }
        .btn-add { background: #00bcd4; color: white; }
        button:active { transform: scale(0.98); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 25px; }
        img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; border: 1px solid #333; }
        #loader { display: none; color: #ffeb3b; margin: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>🐻 Bear Album</h1>
        <button class="btn-view" onclick="render()">👁 Показать всё</button>
        <button class="btn-add" onclick="checkPass()">➕ Добавить фото</button>
        <div id="loader">🚀 Грузим в облако...</div>
        <input type="file" id="fileInput" style="display:none" accept="image/*" onchange="startUpload(this)">
    </div>

    <div id="gallery" class="grid"></div>

    <script>
        // Твой ключ из скриншота 820.png
        const API_KEY = "fdea7279cbfcfbdd490e97027b29ee98"; 
        const PASS = "3664";

        // Загружаем список из памяти браузера
        let photos = JSON.parse(localStorage.getItem('bear_links') || '[]');

        function checkPass() {
            if (prompt("Пароль?") === PASS) {
                document.getElementById('fileInput').click();
            } else {
                alert("Нет!");
            }
        }

        async function startUpload(input) {
            const file = input.files[0];
            if (!file) return;

            document.getElementById('loader').style.display = 'block';
            
            const formData = new FormData();
            formData.append('image', file);

            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.success) {
                    photos.unshift(data.data.url); // Новое фото в начало
                    localStorage.setItem('bear_links', JSON.stringify(photos));
                    render();
                }
            } catch (e) {
                alert("Ошибка сети!");
            } finally {
                document.getElementById('loader').style.display = 'none';
                input.value = ""; 
            }
        }

        function render() {
            const g = document.getElementById('gallery');
            g.innerHTML = photos.length ? "" : "Альбом пуст";
            photos.forEach(url => {
                g.innerHTML += `<img src="${url}">`;
            });
        }

        render(); // Показать фото сразу
    </script>
</body>
</html>
